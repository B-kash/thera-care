version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: physio-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: physio_app
    ports:
      - "5432:5432"
    volumes:
      - physio_postgres_data:/var/lib/postgresql/data

volumes:
  physio_postgres_data: