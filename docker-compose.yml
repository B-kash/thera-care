services:
  postgres:
    image: postgres:16
    container_name: physio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: physio_app
    ports:
      # Use 5433 on the host so a local PostgreSQL install on 5432 does not shadow this service.
      - "5433:5432"
    volumes:
      - physio_postgres_data:/var/lib/postgresql/data

volumes:
  physio_postgres_data:
